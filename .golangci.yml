version: "2"
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  exclusions:
    paths:
      - vendor
      - docs
    rules:
      - path: _test\.go
        linters:
          - errcheck
issues:
  max-issues-per-linter: 0
  max-same-issues: 0

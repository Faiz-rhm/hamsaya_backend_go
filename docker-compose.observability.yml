# Optional observability stack: Jaeger (traces) + Prometheus (metrics scrape)
# + Grafana (dashboards).
#
# Start:
#   docker compose -f docker-compose.observability.yml up -d
#
# Wiring:
#   .env: OBSERVABILITY_ENABLED=true
#         OTLP_ENDPOINT=localhost:4317
#         OBSERVABILITY_SAMPLING_RATE=1.0   # full traces in dev
#
# Then run the backend (e.g. `go run cmd/server/main.go`) and visit:
#   - Grafana:    http://localhost:3001  (admin / admin — change on first login)
#   - Prometheus: http://localhost:9090
#   - Jaeger:     http://localhost:16686
#
# Prometheus scrapes the backend at host.docker.internal:8080/metrics
# (the OTel Prometheus exporter wired in pkg/observability/otel.go).
# The starter dashboard `observability/grafana/dashboards/backend.json`
# is auto-provisioned in Grafana on first start.

services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: hamsaya-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    networks:
      - observability

  prometheus:
    image: prom/prometheus:latest
    container_name: hamsaya-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      # Lets prometheus reach the API running on the host machine.
      - "host.docker.internal:host-gateway"
    networks:
      - observability

  grafana:
    image: grafana/grafana:latest
    container_name: hamsaya-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - observability

volumes:
  prometheus-data:
  grafana-data:

networks:
  observability:
    driver: bridge

# Optional observability stack: Jaeger (traces) + Prometheus (metrics scrape)
# + Grafana (dashboards).
#
# Start:
#   docker compose -f docker-compose.observability.yml up -d
#
# Wiring:
#   .env: OBSERVABILITY_ENABLED=true
#         OTLP_ENDPOINT=localhost:4317
#         OBSERVABILITY_SAMPLING_RATE=1.0   # full traces in dev
#
# Then run the backend (e.g. `go run cmd/server/main.go`) and visit:
#   - Grafana:    http://localhost:3001  (admin / admin — change on first login)
#   - Prometheus: http://localhost:9090
#   - Jaeger:     http://localhost:16686
#
# Prometheus scrapes the backend at host.docker.internal:8080/metrics
# (the OTel Prometheus exporter wired in pkg/observability/otel.go).
# The starter dashboard `observability/grafana/dashboards/backend.json`
# is auto-provisioned in Grafana on first start.

services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: hamsaya-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    networks:
      - observability

  prometheus:
    image: prom/prometheus:latest
    container_name: hamsaya-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      # Lets prometheus reach the API running on the host machine.
      - "host.docker.internal:host-gateway"
    networks:
      - observability

  # Host metrics: CPU (incl. %st STEAL — the shared-vCPU noisy-neighbor signal),
  # RAM, disk I/O, network. node_cpu_seconds_total{mode="steal"} is the metric
  # that tells you whether a dedicated-vCPU (CCX) upgrade is justified.
  node-exporter:
    image: prom/node-exporter:latest
    container_name: hamsaya-node-exporter
    command:
      - --path.rootfs=/host
      - --collector.processes
    pid: host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "127.0.0.1:9100:9100"   # loopback only — scraped by prometheus over host network
    restart: unless-stopped
    networks:
      - observability

  # Per-container CPU / memory / I/O. This is where "Postgres CPU %" comes from
  # (container_cpu_usage_seconds_total{name="hamsaya-postgres-prod"}), separate
  # from the host total node-exporter reports.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: hamsaya-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "127.0.0.1:8081:8080"
    restart: unless-stopped
    networks:
      - observability

  # Postgres internals: numbackends (active connections vs the 100 max),
  # pg_stat_activity waiting clients, cache hit ratio, DB size, locks.
  # Connects over the host loopback to the port postgres publishes (5432).
  # Requires DB_PASSWORD in the environment / .env when starting this stack.
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: hamsaya-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD required to scrape postgres}@host.docker.internal:5432/${DB_NAME:-hamsaya}?sslmode=disable"
    ports:
      - "127.0.0.1:9187:9187"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - observability

  grafana:
    image: grafana/grafana:latest
    container_name: hamsaya-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - observability

volumes:
  prometheus-data:
  grafana-data:

networks:
  observability:
    driver: bridge

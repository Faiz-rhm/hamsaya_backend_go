services:
  # PostgreSQL Database with PostGIS
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: hamsaya-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-hamsaya}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Database password required}
      # Alpine musl libc lacks full locales; use C.UTF-8 which is always present.
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C.UTF-8 --lc-ctype=C.UTF-8"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # NOTE: do NOT mount ./migrations into /docker-entrypoint-initdb.d.
      # Migrations are golang-migrate format (.up.sql + .down.sql pairs);
      # postgres initdb would run both directions on first boot. The api
      # container runs `migrate up` against an empty DB at startup instead.
    ports:
      - "127.0.0.1:5432:5432"  # Only expose to localhost
    networks:
      - hamsaya_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-hamsaya}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=2MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c max_worker_processes=4
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
      -c max_parallel_maintenance_workers=2

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: hamsaya-redis-prod
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?Redis password required}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"  # Only expose to localhost
    networks:
      - hamsaya_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: hamsaya-minio-prod
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:?MinIO access key required}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:?MinIO secret key required}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_URL:-http://minio.localhost}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"  # API - Only expose to localhost
      - "127.0.0.1:9001:9001"  # Console - Only expose to localhost
    networks:
      - hamsaya_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # Hamsaya Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: hamsaya/backend:${VERSION:-latest}
    container_name: hamsaya-api-prod
    restart: unless-stopped
    environment:
      # Server
      SERVER_PORT: "8080"
      SERVER_HOST: "0.0.0.0"
      ENV: "production"
      LOG_LEVEL: "info"

      # Database
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-hamsaya}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL_MODE: "disable"
      DB_MAX_CONNS: "50"
      DB_MIN_CONNS: "10"
      DB_MAX_CONN_LIFETIME: "1h"
      DB_MAX_CONN_IDLE_TIME: "30m"

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"

      # JWT
      JWT_SECRET: ${JWT_SECRET:?JWT secret required}
      JWT_ACCESS_TOKEN_DURATION: "15m"
      JWT_REFRESH_TOKEN_DURATION: "720h"

      # Storage
      STORAGE_ENDPOINT: "minio:9000"
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_BUCKET_NAME: ${STORAGE_BUCKET_NAME:-hamsaya}
      STORAGE_USE_SSL: "false"
      STORAGE_REGION: "us-east-1"
      CDN_URL: ${CDN_URL:-}

      # Firebase
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-}

      # OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY:-}

      # Email
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@hamsaya.app}

      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://hamsaya.app,https://www.hamsaya.app}
      CORS_ALLOWED_METHODS: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
      CORS_ALLOWED_HEADERS: "Authorization,Content-Type,Accept,Origin,User-Agent,X-Requested-With"
      CORS_ALLOW_CREDENTIALS: "true"

      # Rate Limiting
      RATE_LIMIT_REQUESTS_PER_HOUR: "1000"
      RATE_LIMIT_AUTH_ATTEMPTS: "5"
      RATE_LIMIT_AUTH_WINDOW: "15m"

      # Geocoding
      GEOCODING_API_KEY: ${GEOCODING_API_KEY:-}
      GEOCODING_PROVIDER: ${GEOCODING_PROVIDER:-google}

      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN:-}
      PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED:-false}
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-true}

      # JWT extras
      JWT_REFRESH_GRACE: ${JWT_REFRESH_GRACE:-60s}
      DEVICE_CREDENTIAL_DURATION: ${DEVICE_CREDENTIAL_DURATION:-4320h}

      # Firebase service-account fields (PEM may be base64; see normalizePEM)
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}

      # Email (Resend takes precedence over SMTP when set)
      RESEND_API_KEY: ${RESEND_API_KEY:-}

      # MFA (AES-GCM encryption of stored TOTP secrets) — required at boot
      MFA_SECRET_ENCRYPTION_KEY: ${MFA_SECRET_ENCRYPTION_KEY:?MFA_SECRET_ENCRYPTION_KEY required (32-byte hex)}

      # Encrypted DB backups (in-app BackupService)
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      BACKUP_PASSPHRASE: ${BACKUP_PASSPHRASE:?BACKUP_PASSPHRASE required when BACKUP_ENABLED=true}
      BACKUP_LOCAL_DIR: ${BACKUP_LOCAL_DIR:-/var/lib/hamsaya/backups}
      BACKUP_BUCKET: ${BACKUP_BUCKET:-hamsaya-backups}
    volumes:
      - backup_data:/var/lib/hamsaya/backups
    ports:
      - "127.0.0.1:8080:8080"  # Loopback only; Dokploy Traefik routes to api:8080 over docker network
    networks:
      - hamsaya_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      # replicas removed: incompatible with container_name in standalone Compose.
      # For HA, drop container_name and re-enable replicas (Dokploy / Swarm).
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  # NOTE: Standalone nginx reverse-proxy service removed. Dokploy provides
  # Traefik on host ports 80/443 — configure domain routing in the Dokploy
  # panel to send traffic to api:8080 on the project network.

  # NOTE: Standalone db-backup cron service removed. Backups handled in-app by
  # BackupService (pg_dump → gpg AES256 → MinIO + local volume + GFS retention).
  # See pkg-internal cron in cmd/server/main.go gated by BACKUP_ENABLED.

networks:
  hamsaya_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  backup_data:
    driver: local

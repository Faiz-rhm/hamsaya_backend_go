services:
  # PostgreSQL with PostGIS extension.
  #
  # NOTE: dev compose binds to 0.0.0.0 (default Docker behaviour, ports listed
  # without an explicit IP) so a physical iOS / Android device on the same
  # LAN can reach the API + storage during dev. Production compose
  # (docker-compose.prod.yml) MUST bind to 127.0.0.1 and keep services
  # behind a reverse proxy with TLS.
  #
  # Password auth is required even in dev (`trust` removed) so the dev
  # surface isn't a free-for-all on the LAN.
  postgres:
    image: postgis/postgis:15-3.3
    container_name: hamsaya-postgres
    environment:
      POSTGRES_DB: hamsaya
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hamsaya-network

  # Redis for caching and rate limiting.
  # Password-protected via REDIS_PASSWORD from .env (with sensible dev fallback).
  redis:
    image: redis:7-alpine
    container_name: hamsaya-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-devredispass}"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devredispass}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - hamsaya-network

  # MinIO for object storage (S3-compatible).
  # LAN-bound for device-side image loading during dev; password-protected.
  minio:
    image: minio/minio:latest
    container_name: hamsaya-minio
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: hamsaya-dev-access
      MINIO_ROOT_PASSWORD: ac0e615dbb2d9b2bdd05c74e90639af5
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9003
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hamsaya-network

  # API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hamsaya-api
    # API binds 0.0.0.0 (default) so the iOS / Android dev device on the
    # LAN can reach `http://192.168.x.x:8080`. Production compose must
    # bind 127.0.0.1 + sit behind a TLS-terminating reverse proxy.
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - ENV=development
      - LOG_LEVEL=debug
      - SERVER_PORT=8080
      - SERVER_HOST=0.0.0.0
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=hamsaya
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_SSL_MODE=disable
      - DB_MAX_CONNS=25
      - DB_MIN_CONNS=5
      - DB_MAX_CONN_LIFETIME=1h
      - DB_MAX_CONN_IDLE_TIME=30m
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-devredispass}
      - REDIS_DB=0
      # JWT_SECRET intentionally NOT set here — must come from .env. Compose
      # will fail-fast at config.Load() if missing/weak, which is the desired
      # behaviour. No default literal so accidental promotion to staging/prod
      # cannot inherit a known-bad value.
      - JWT_ACCESS_TOKEN_DURATION=15m
      - JWT_REFRESH_TOKEN_DURATION=2160h
      - STORAGE_ENDPOINT=minio:9000
      - STORAGE_ACCESS_KEY=hamsaya-dev-access
      - STORAGE_SECRET_KEY=ac0e615dbb2d9b2bdd05c74e90639af5
      - STORAGE_BUCKET_NAME=hamsaya-uploads
      - STORAGE_USE_SSL=false
      - STORAGE_REGION=us-east-1
      - CDN_URL=http://192.168.100.39:9002
      - RATE_LIMIT_REQUESTS_PER_HOUR=1000
      - RATE_LIMIT_AUTH_ATTEMPTS=5
      - RATE_LIMIT_AUTH_WINDOW=15m
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001
      - PROMETHEUS_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - hamsaya-network
    restart: unless-stopped

networks:
  hamsaya-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
